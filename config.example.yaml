feishu:
  app_id: "your-app-id"
  app_secret: "your-app-secret"

providers:
  claude:
    api_key: "sk-ant-..."
    model: "claude-opus-4-6"
  gemini:
    api_key: "AIza..."
    model: "gemini-2.0-flash"
  openai:
    api_key: "sk-..."
    model: "gpt-4o"

default_provider: "claude"

session:
  max_history: 20
  timeout_minutes: 30

agent:
  cwd: "/path/to/agent/workspace"
  allowed_tools: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
  max_agents: 3
  timeout_minutes: 120
  # 图片临时文件目录，不配置则使用系统临时目录
  temp_dir: "/path/to/temp"
  # 管理员 open_id 列表，只有这些用户可以审批 Agent 执行
  # 留空则不启用审批，所有 @机器人 的消息直接执行
  admin_ids: []
  # 批准有效期（分钟），批准某用户后在此时间内无需重复审批，0 表示每次都需要
  approval_expire_minutes: 1440
